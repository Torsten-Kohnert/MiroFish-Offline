services:
  mirofish:
    build: .
    container_name: mirofish-offline
    environment:
      - NEO4J_URI=${MIROFISH_NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${MIROFISH_NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${MIROFISH_NEO4J_PASSWORD:-mirofish}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL}
    ports:
      - "3002:3000"
      - "5002:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
    depends_on:
      - neo4j
    networks:
      - mirofish-net

  neo4j:
    image: neo4j:5.18-community
    container_name: mirofish-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/mirofish
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    networks:
      - mirofish-net

networks:
  mirofish-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
